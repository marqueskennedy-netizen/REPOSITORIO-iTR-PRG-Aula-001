<!--
Aula 4A: Interruptor da Lâmpada (Alternando Estados Booleanos)
O que vamos aprender: Como trabalhar com propriedades lógicas/booleanas 
(true ou false) para alternar estados e modificar elementos visuais do HTML 
com base nisso.
O que o código faz: Criamos o objeto lampada com a propriedade ligada iniciando
 em false (desligada). O método alternar usa o operador de negação (!this.ligada) 
 para inverter o estado atual: se for falso vira verdadeiro, se for verdadeiro 
 vira falso. Na interface, usamos uma condicional para exibir o texto "LIGADA" 
 ou "DESLIGADA" de acordo com o estado do objeto.
-->
 <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>4A - Fazer Junto: Lâmpada</title>
</head>
<body>
    <h2>Exemplo 4A: Lâmpada O.O.</h2>
    <p>A lâmpada está: <strong id="txtLampada">DESLIGADA</strong></p>
    <button onclick="alternarLampada()">Interruptor</button>

    <script>
        const lampada={
            ligada:false,
            alternar:function(){
                this.ligada = !this.ligada// iverte o booleano
            }
        };
        function alternarLampada(){
            lampada.alternar();
            document.getElementById("txtlampada").innerText = lampada.ligada ?
            "LIGADA" : "DESLIGADA"
        }
    </script>
</body>
</html>
