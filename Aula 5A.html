Aula 5A: Caixa Eletrônico - Depósito (Métodos que Recebem Parâmetros)
O que vamos aprender: Como enviar um valor de fora do objeto (neste caso, digitado 
pelo usuário em um campo de texto/input) para dentro de um método através de 
parâmetros.

depositar(valor) foi programado para receber uma quantia desconhecida por parâmetro. 
Quando o usuário digita um número no input e clica no botão, o JavaScript pega esse 
valor e o envia para dentro do método, que soma o dinheiro ao saldo atual da conta.
-->
